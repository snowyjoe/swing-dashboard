<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swing Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --border: #e4e6ea;
    --border-2: #eef0f2;
    --text: #1a1d21;
    --text-2: #5a6068;
    --text-3: #8a9099;
    --accent: #2563eb;

    --bull: #15803d;        --bull-bg:    #dcfce7;
    --recov: #0369a1;       --recov-bg:   #e0f2fe;
    --side: #b45309;        --side-bg:    #fef3c7;
    --correct: #b91c1c;     --correct-bg: #fee2e2;
    --bear: #7f1d1d;        --bear-bg:    #fecaca;
    --chop: #6d28d9;        --chop-bg:    #ede9fe;

    --mono: 'JetBrains Mono', Consolas, 'Courier New', monospace;
    --sans: 'DM Sans', -apple-system, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); }
  body {
    font-family: var(--sans);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    padding: 18px 14px;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1080px; margin: 0 auto; }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0 2px 14px 2px;
  }
  .header h1 {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-2);
  }
  .header .meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-3);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 10px;
  }
  .card-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 10px;
  }

  /* ---------- Transition strip ---------- */
  .transition {
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .trans-days { display: flex; gap: 3px; }
  .trans-day {
    min-width: 58px;
    padding: 6px 8px;
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    border-radius: 4px;
    color: #fff;
    position: relative;
  }
  .trans-day.today::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -5px;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
  }
  .trans-day.bull    { background: var(--bull);    }
  .trans-day.recov   { background: var(--recov);   }
  .trans-day.side    { background: var(--side);    }
  .trans-day.correct { background: var(--correct); }
  .trans-day.bear    { background: var(--bear);    }

  .trans-status {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex: 1;
    flex-wrap: wrap;
  }
  .trans-status .status {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .trans-status .status.improving { color: var(--bull);    }
  .trans-status .status.weakening { color: var(--correct); }
  .trans-status .status.stable    { color: var(--text);    }
  .trans-status .status.choppy    { color: var(--chop);    }
  .trans-status .note {
    font-size: 12px;
    color: var(--text-2);
  }

  /* ---------- Playbook (HERO) ---------- */
  .playbook {
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    padding: 18px 22px 16px 22px;
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
  }
  .playbook .card-label {
    color: var(--accent);
    font-size: 11px;
    margin-bottom: 12px;
  }
  .play-row {
    display: grid;
    grid-template-columns: 72px 1fr auto;
    align-items: center;
    gap: 14px;
    padding: 9px 0;
    border-bottom: 1px dashed var(--border-2);
  }
  .play-row:last-of-type { border-bottom: none; }
  .play-key {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--text-3);
  }
  .play-val {
    font-size: 16px;
    font-weight: 600;
    font-family: var(--mono);
    letter-spacing: 0.01em;
  }
  .play-val .sep  { color: var(--text-3); margin: 0 8px; font-weight: 400; }
  .play-val .tag  {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    color: var(--text-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-left: 5px;
  }
  .play-val.run    { color: var(--bull);    }
  .play-val.skip   { color: var(--correct); }
  .play-val.focus  { color: var(--bull);    }
  .play-val.watch  { color: var(--side);    }
  .play-val.avoid  { color: var(--correct); }
  .play-val.none   { color: var(--text-3); font-style: italic; }
  .play-hint {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
    font-weight: 600;
  }
  .play-footer {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-2);
  }
  .play-footer span strong {
    color: var(--text);
    font-weight: 700;
    margin-right: 4px;
  }
  .play-override {
    background: var(--chop-bg);
    color: var(--chop);
    font-weight: 700;
    padding: 10px 14px;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 13px;
    letter-spacing: 0.02em;
  }

  /* ---------- Insight ---------- */
  .insight ul { list-style: none; }
  .insight li {
    padding: 5px 0;
    font-size: 13px;
    color: var(--text);
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .insight li::before {
    content: '→';
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
  }

  /* ---------- Scan Here ---------- */
  .scan { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .scan-col .scan-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .scan-col.strong .scan-title { color: var(--bull);    }
  .scan-col.weak   .scan-title { color: var(--correct); }
  .scan-list { display: flex; gap: 6px; }
  .scan-item {
    flex: 1;
    padding: 9px 8px;
    border-radius: 4px;
    text-align: center;
  }
  .scan-item.strong { background: var(--bull-bg);    color: var(--bull);    }
  .scan-item.weak   { background: var(--correct-bg); color: var(--correct); }
  .scan-item .name {
    display: block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .scan-item .val {
    display: block;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    margin-top: 3px;
  }

  /* ---------- Market pulse ---------- */
  .pulse-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .pulse-cell {
    background: var(--card);
    padding: 10px 12px;
  }
  .pulse-cell .p-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-3);
    font-weight: 700;
    text-transform: uppercase;
  }
  .pulse-cell .p-val {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
    margin-top: 3px;
    color: var(--text);
  }
  .pulse-cell .p-change {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    margin-top: 2px;
  }
  .pulse-cell .p-change.pos { color: var(--bull);    }
  .pulse-cell .p-change.neg { color: var(--correct); }

  .breadth-row {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-2);
  }
  .breadth-row .b-lbl {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text-3);
  }
  .breadth-bar {
    flex: 1;
    height: 6px;
    background: var(--correct-bg);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .breadth-fill { height: 100%; background: var(--bull); transition: width 0.5s; }

  /* ---------- Sector grid ---------- */
  .sector-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
  }
  .sect-cell {
    padding: 8px 9px;
    border-radius: 4px;
    font-size: 11px;
  }
  .sect-cell.bull    { background: var(--bull-bg);    }
  .sect-cell.recov   { background: var(--recov-bg);   }
  .sect-cell.side    { background: var(--side-bg);    }
  .sect-cell.correct { background: var(--correct-bg); }
  .sect-cell .s-name {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .sect-cell.bull    .s-name { color: var(--bull);    }
  .sect-cell.recov   .s-name { color: var(--recov);   }
  .sect-cell.side    .s-name { color: var(--side);    }
  .sect-cell.correct .s-name { color: var(--correct); }
  .sect-cell .s-change {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    margin-top: 3px;
    color: var(--text);
  }

  /* ---------- Risk strip ---------- */
  .risk {
    display: flex;
    gap: 16px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-3);
    flex-wrap: wrap;
    justify-content: center;
    padding: 12px 0 4px 0;
  }
  .risk span strong {
    color: var(--text-2);
    font-weight: 700;
    margin-right: 3px;
  }

  /* ---------- States ---------- */
  .loading, .error {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-2);
    font-size: 13px;
  }
  .error small { display: block; margin-top: 6px; color: var(--text-3); font-family: var(--mono); font-size: 11px; }
  .error button {
    margin-top: 14px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }
  .error button:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 720px) {
    body { padding: 12px 10px; }
    .pulse-grid  { grid-template-columns: repeat(2, 1fr); }
    .sector-grid { grid-template-columns: repeat(2, 1fr); }
    .scan        { grid-template-columns: 1fr; }
    .play-row    { grid-template-columns: 64px 1fr; }
    .play-row .play-hint { grid-column: 2; font-size: 10px; }
    .transition  { flex-direction: column; align-items: flex-start; gap: 12px; }
    .trans-day   { min-width: 50px; font-size: 9px; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading">Loading…</div>
</div>

<script>
const REGIME_COLOUR = {
  'Bullish Trending': 'bull',
  'Bullish': 'bull',
  'Recovering': 'recov',
  'Sideways': 'side',
  'Correcting': 'correct',
  'Bear': 'bear'
};

function fmt(n, d) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-IN', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function signed(n, d) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const v = Number(n);
  return (v >= 0 ? '+' : '') + v.toFixed(d) + '%';
}

function renderTransition(t) {
  const days = t.history.map((d, i) => {
    const isToday = i === t.history.length - 1;
    const colour = (d.colour || 'side').toLowerCase();
    return `<div class="trans-day ${colour} ${isToday ? 'today' : ''}" title="${d.date} · ${d.regime}">${d.label}</div>`;
  }).join('');
  const dirClass = (t.direction || 'stable').toLowerCase();
  return `
    <div class="card">
      <div class="transition">
        <div class="trans-days">${days}</div>
        <div class="trans-status">
          <span class="status ${dirClass}">${t.status}</span>
          <span class="note">${t.note || ''}</span>
        </div>
      </div>
    </div>`;
}

function renderPlaybook(p) {
  const override = p.override
    ? `<div class="play-override">⚠ ${p.override}</div>`
    : '';

  const runHtml = (p.run && p.run.length)
    ? p.run.map((r, i) => {
        const tag = r.priority === 'primary' ? 'priority' : (r.priority || 'secondary');
        return `${r.module}<span class="tag">${tag}</span>`;
      }).join('<span class="sep">·</span>')
    : '<span class="none">— stand aside —</span>';

  const skipHtml = (p.skip && p.skip.length)
    ? p.skip.map(s => s.module).join('<span class="sep">·</span>')
    : '<span class="none">none</span>';

  const listOr = (arr, fallback) =>
    (arr && arr.length) ? arr.map(s => s.replace(/_/g, ' ')).join('<span class="sep">·</span>')
                        : `<span class="none">${fallback}</span>`;

  return `
    <div class="card playbook">
      <div class="card-label">Today's Playbook</div>
      ${override}
      <div class="play-row">
        <div class="play-key">RUN</div>
        <div class="play-val run">${runHtml}</div>
        <div class="play-hint">${p.run.length} module${p.run.length === 1 ? '' : 's'}</div>
      </div>
      <div class="play-row">
        <div class="play-key">SKIP</div>
        <div class="play-val skip">${skipHtml}</div>
        <div class="play-hint"></div>
      </div>
      <div class="play-row">
        <div class="play-key">FOCUS</div>
        <div class="play-val focus">${listOr(p.focus_sectors, 'none')}</div>
        <div class="play-hint">full size</div>
      </div>
      <div class="play-row">
        <div class="play-key">WATCH</div>
        <div class="play-val watch">${listOr(p.watch_sectors, '—')}</div>
        <div class="play-hint">half size</div>
      </div>
      <div class="play-row">
        <div class="play-key">AVOID</div>
        <div class="play-val avoid">${listOr(p.avoid_sectors, '—')}</div>
        <div class="play-hint">skip</div>
      </div>
      <div class="play-footer">
        <span><strong>Cap:</strong> ${p.cap_new_entries} new entries</span>
        <span><strong>Size:</strong> ${p.size_rule}${p.size_reason ? ' — ' + p.size_reason : ''}</span>
      </div>
    </div>`;
}

function renderInsight(insights) {
  if (!insights || insights.length === 0) {
    return `
      <div class="card insight">
        <div class="card-label">Insight</div>
        <ul><li>No significant changes — continue current regime playbook.</li></ul>
      </div>`;
  }
  const items = insights.slice(0, 3).map(i => `<li>${i.text}</li>`).join('');
  return `
    <div class="card insight">
      <div class="card-label">Insight</div>
      <ul>${items}</ul>
    </div>`;
}

function renderScan(sc) {
  const mkItem = (s, cls) =>
    `<div class="scan-item ${cls}"><span class="name">${s.sector.replace(/_/g, ' ')}</span><span class="val">${signed(s.distance_pct, 1)}</span></div>`;
  const strong = sc.strong.map(s => mkItem(s, 'strong')).join('');
  const weak   = sc.weak.map(s => mkItem(s, 'weak')).join('');
  return `
    <div class="card">
      <div class="card-label">Scan Here · distance from 20 EMA</div>
      <div class="scan">
        <div class="scan-col strong">
          <div class="scan-title">Strong · M1 / M3</div>
          <div class="scan-list">${strong}</div>
        </div>
        <div class="scan-col weak">
          <div class="scan-title">Weak · M2</div>
          <div class="scan-list">${weak}</div>
        </div>
      </div>
    </div>`;
}

function renderPulse(m, br) {
  const cells = ['nifty', 'bank_nifty', 'midcap', 'vix'].map(k => {
    const q = m[k];
    const cls = q.change_pct >= 0 ? 'pos' : 'neg';
    return `<div class="pulse-cell">
      <div class="p-label">${q.label}</div>
      <div class="p-val">${fmt(q.current_close, 2)}</div>
      <div class="p-change ${cls}">${signed(q.change_pct, 2)}</div>
    </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="card-label">Market Pulse</div>
      <div class="pulse-grid">${cells}</div>
      <div class="breadth-row">
        <span class="b-lbl">BREADTH</span>
        <div class="breadth-bar"><div class="breadth-fill" style="width: ${br.breadth_pct}%"></div></div>
        <span>${br.breadth_pct.toFixed(1)}% · ${br.above_ema}/${br.total_constituents}</span>
      </div>
    </div>`;
}

function renderSectors(secs) {
  const cells = Object.entries(secs).map(([name, s]) => {
    const cls = (s.regime_colour || REGIME_COLOUR[s.regime] || 'side').toLowerCase();
    return `<div class="sect-cell ${cls}">
      <div class="s-name">${name.replace(/_/g, ' ')}</div>
      <div class="s-change">${signed(s.change_pct, 2)}</div>
    </div>`;
  }).join('');
  return `
    <div class="card">
      <div class="card-label">Sectors</div>
      <div class="sector-grid">${cells}</div>
    </div>`;
}

function renderRisk(r) {
  return `
    <div class="risk">
      <span><strong>Risk/trade:</strong> ${r.max_risk_per_trade}</span>
      <span><strong>Max open:</strong> ${r.max_open_trades}</span>
      <span><strong>Port risk:</strong> ${r.max_portfolio_risk}</span>
      <span><strong>Stop:</strong> ${r.stop_loss_method}</span>
      <span><strong>Time stop:</strong> ${r.time_stop}</span>
      <span><strong>3 losses/wk:</strong> stop</span>
    </div>`;
}

function render(data) {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header">
      <h1>Swing Dashboard</h1>
      <div class="meta">${data.meta.generated_date} · ${data.meta.generated_time}</div>
    </div>
    ${renderTransition(data.regime_transition)}
    ${renderPlaybook(data.playbook)}
    ${renderInsight(data.market_insight)}
    ${renderScan(data.scan_here)}
    ${renderPulse(data.market_pulse, data.breadth)}
    ${renderSectors(data.sector_regimes)}
    ${renderRisk(data.risk_rules)}
  `;
}

function load() {
  document.getElementById('app').innerHTML = '<div class="loading">Loading…</div>';
  fetch('dashboard_data.json?_=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(err => {
      document.getElementById('app').innerHTML =
        `<div class="error">
           Could not load <code>dashboard_data.json</code>
           <small>${err.message}</small>
           <button onclick="load()">Retry</button>
         </div>`;
    });
}
load();
</script>
</body>
</html>
